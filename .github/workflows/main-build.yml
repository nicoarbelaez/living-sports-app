name: Production Release

on:
  push:
    branches:
      - main

jobs:
  release-and-build:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

      - name: Create release
        id: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          OUTPUT=$(npx semantic-release 2>&1) || true
          echo "$OUTPUT"

          if echo "$OUTPUT" | grep -q "Published release"; then
            VERSION=$(echo "$OUTPUT" | grep -oP 'Published release \K[0-9]+\.[0-9]+\.[0-9]+')
            echo "release=true" >> $GITHUB_OUTPUT
            echo "version=$VERSION" >> $GITHUB_OUTPUT
          else
            echo "release=false" >> $GITHUB_OUTPUT
          fi

      - name: Setup Expo
        if: steps.release.outputs.release == 'true'
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build Android
        if: steps.release.outputs.release == 'true'
        run: |
          eas build --platform android --profile production --non-interactive --wait

      - name: Get build URL
        id: build-url
        if: steps.release.outputs.release == 'true'
        run: |
          BUILD_URL=$(eas build:list \
            --platform android \
            --status finished \
            --limit 1 \
            --json \
            --non-interactive | jq -r '.[0].artifacts.buildUrl')

          echo "url=$BUILD_URL" >> "$GITHUB_OUTPUT"

      - name: Download build
        if: steps.build-url.outputs.url != ''
        run: |
          curl -L -o living-sports.apk "${{ steps.build-url.outputs.url }}"

      - name: Attach build to release
        if: steps.build-url.outputs.url != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.release.outputs.version }}
          files: living-sports.apk