name: Production Release

on:
  push:
    branches:
      - main

env:
  NODE_VERSION: '22'

jobs:
  release-and-build:
    name: Release & Build
    runs-on: ubuntu-latest

    permissions:
      contents: write
      issues: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Capture version before release
        id: pre-release
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Semantic Release
        run: npx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Check if new version was published
        id: release-check
        run: |
          NEW_VERSION=$(node -p "require('./package.json').version")
          OLD_VERSION="${{ steps.pre-release.outputs.version }}"
          if [ "$NEW_VERSION" != "$OLD_VERSION" ]; then
            echo "published=true" >> $GITHUB_OUTPUT
            echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
          else
            echo "published=false" >> $GITHUB_OUTPUT
          fi

      - name: Setup Expo
        if: steps.release-check.outputs.published == 'true'
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build Android APK (EAS)
        if: steps.release-check.outputs.published == 'true'
        run: eas build --platform android --profile production --non-interactive --wait
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Get APK download URL
        id: build-url
        if: steps.release-check.outputs.published == 'true'
        run: |
          BUILD_URL=$(eas build:list --platform android --limit 1 --json --non-interactive | jq -r '.[0].artifacts.buildUrl')
          echo "url=$BUILD_URL" >> $GITHUB_OUTPUT

      - name: Download APK
        if: steps.release-check.outputs.published == 'true' && steps.build-url.outputs.url != ''
        run: curl -L -o app-release.apk "${{ steps.build-url.outputs.url }}"

      - name: Upload APK to GitHub Release
        if: steps.release-check.outputs.published == 'true' && steps.build-url.outputs.url != ''
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload v${{ steps.release-check.outputs.version }} app-release.apk
