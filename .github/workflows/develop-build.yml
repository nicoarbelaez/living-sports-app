name: Development Version

on:
  push:
    branches:
      - develop

jobs:
  release:
    name: Generate development version
    runs-on: ubuntu-latest

    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

      - name: Generate prerelease
        id: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          OUTPUT=$(npx semantic-release 2>&1) || true
          echo "$OUTPUT"

          if echo "$OUTPUT" | grep -q "Published release"; then
            VERSION=$(echo "$OUTPUT" | grep -oP 'Published release \K[0-9]+\.[0-9]+\.[0-9]+')
            echo "release=true" >> $GITHUB_OUTPUT
            echo "version=$VERSION" >> $GITHUB_OUTPUT
          else
            echo "release=false" >> $GITHUB_OUTPUT
          fi

      - name: Update package.json + app.json
        if: steps.release.outputs.release == 'true'
        run: |
          VERSION=${{ steps.release.outputs.version }}

          # Actualiza package.json.version
          jq ".version = \"$VERSION\"" package.json > tmp.package.json && mv tmp.package.json package.json

          # Actualiza expo.version en app.json
          jq ".expo.version = \"$VERSION\"" app.json > tmp.app.json && mv tmp.app.json app.json

          # Commit and push changes back to develop
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add package.json app.json
          git commit -m "chore: bump version to $VERSION [skip ci]" || echo "no changes to commit"
          git push origin develop
